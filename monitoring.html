<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring - SIPEDULI BADUNG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header p-3 text-center">
            <i class="bi bi-heart-pulse-fill fs-2 text-white"></i>
            <h6 class="text-white fw-bold mt-2 mb-0">SIPEDULI BADUNG</h6>
            <small class="text-white-50">Monitoring</small>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link-sidebar"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="data-disabilitas.html" class="nav-link-sidebar"><i class="bi bi-people"></i> Data Disabilitas</a>
            <a href="asesmen.html" class="nav-link-sidebar"><i class="bi bi-clipboard2-check"></i> e-Asesmen</a>
            <a href="monitoring.html" class="nav-link-sidebar active"><i class="bi bi-geo-alt"></i> Monitoring</a>
            <a href="laporan.html" class="nav-link-sidebar"><i class="bi bi-file-earmark-bar-graph"></i> Laporan</a>
            <a href="pimpinan.html" class="nav-link-sidebar"><i class="bi bi-bar-chart-line"></i> Dashboard Pimpinan</a>
            <hr class="text-white-50 mx-3">
            <a href="login.html" class="nav-link-sidebar text-danger" onclick="sessionStorage.clear()"><i class="bi bi-box-arrow-right"></i> Keluar</a>
        </nav>
    </div>

    <div class="main-content">
        <nav class="navbar top-navbar shadow-sm px-4">
            <button class="btn btn-sm btn-outline-secondary d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <h5 class="mb-0 fw-bold text-maroon">Monitoring Bantuan</h5>
            <div>
                <button class="btn btn-maroon btn-sm rounded-pill" data-bs-toggle="modal" data-bs-target="#modalCatat">
                    <i class="bi bi-plus-circle me-1"></i>Catat Bantuan
                </button>
            </div>
        </nav>

        <div class="content-area p-4">
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm bg-success bg-opacity-10">
                        <div class="card-body text-center">
                            <i class="bi bi-check-circle-fill text-success fs-1"></i>
                            <h3 class="fw-bold mt-2" id="statDisalurkan">0</h3>
                            <p class="text-muted mb-0">Sudah Disalurkan</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm bg-warning bg-opacity-10">
                        <div class="card-body text-center">
                            <i class="bi bi-hourglass-split text-warning fs-1"></i>
                            <h3 class="fw-bold mt-2" id="statPendampingan">0</h3>
                            <p class="text-muted mb-0">Dalam Pendampingan</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm bg-info bg-opacity-10">
                        <div class="card-body text-center">
                            <i class="bi bi-flag-fill text-info fs-1"></i>
                            <h3 class="fw-bold mt-2" id="statSelesai">0</h3>
                            <p class="text-muted mb-0">Selesai Program</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white fw-bold text-maroon">
                    <i class="bi bi-clock-history me-2"></i>Riwayat Bantuan
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="bg-maroon text-white">
                                <tr><th>Tanggal</th><th>Penerima</th><th>Jenis</th><th>Kecamatan</th><th>Petugas</th><th>Status</th></tr>
                            </thead>
                            <tbody id="tbodyBantuan">
                                <tr><td colspan="6" class="text-center py-3">Memuat data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Catat Bantuan -->
    <div class="modal fade" id="modalCatat" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-maroon text-white">
                    <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Catat Penyaluran Bantuan</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formBantuan">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nama Penerima</label>
                            <input type="text" class="form-control" name="nama_penerima" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Jenis Bantuan</label>
                            <select class="form-select" name="jenis_bantuan" required>
                                <option value="">Pilih Jenis</option>
                                <option>Bantuan Sosial</option>
                                <option>Kursi Roda</option>
                                <option>Tongkat</option>
                                <option>Alat Dengar</option>
                                <option>Kaki Palsu</option>
                                <option>Rehabilitasi Sosial</option>
                                <option>Pelatihan Kerja</option>
                                <option>Pendampingan</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Kecamatan</label>
                            <select class="form-select" name="kecamatan" required>
                                <option>Kuta</option><option>Kuta Selatan</option><option>Abiansemal</option><option>Mengwi</option><option>Petang</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Status</label>
                            <select class="form-select" name="status">
                                <option>Disalurkan</option><option>Pendampingan</option><option>Selesai</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Catatan</label>
                            <textarea class="form-control" name="catatan" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-maroon" onclick="simpanBantuan()">
                        <i class="bi bi-save me-1"></i>SIMPAN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        async function loadBantuan() {
            const result = await api.getBantuan();
            if (result.success) {
                renderBantuan(result.data);
                updateStats(result.data);
            }
        }

        function renderBantuan(data) {
            const tbody = document.getElementById('tbodyBantuan');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">Belum ada data</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(row => {
                const tgl = row.tanggal_penyaluran ? new Date(row.tanggal_penyaluran).toLocaleDateString('id-ID') : '-';
                let badge = 'bg-secondary';
                if (row.status === 'Disalurkan') badge = 'bg-success';
                else if (row.status === 'Pendampingan') badge = 'bg-warning text-dark';
                else if (row.status === 'Selesai') badge = 'bg-info';
                return `<tr>
                    <td>${tgl}</td>
                    <td>${row.nama_penerima || '-'}</td>
                    <td>${row.jenis_bantuan || '-'}</td>
                    <td>${row.kecamatan || '-'}</td>
                    <td>${row.petugas || '-'}</td>
                    <td><span class="badge ${badge}">${row.status || '-'}</span></td>
                </tr>`;
            }).join('');
        }

        function updateStats(data) {
            let disalurkan = 0, pendampingan = 0, selesai = 0;
            data.forEach(r => {
                if (r.status === 'Disalurkan') disalurkan++;
                else if (r.status === 'Pendampingan') pendampingan++;
                else if (r.status === 'Selesai') selesai++;
            });
            document.getElementById('statDisalurkan').textContent = disalurkan;
            document.getElementById('statPendampingan').textContent = pendampingan;
            document.getElementById('statSelesai').textContent = selesai;
        }

        async function simpanBantuan() {
            const form = document.getElementById('formBantuan');
            const fd = new FormData(form);
            const data = Object.fromEntries(fd.entries());
            data.petugas = sessionStorage.getItem('userName') || '';
            data.tanggal_penyaluran = new Date().toISOString();
            
            showLoading('Menyimpan...');
            const result = await api.saveBantuan(data);
            hideLoading();
            
            if (result.success) {
                showNotification('✅ Bantuan berhasil dicatat', 'success');
                bootstrap.Modal.getInstance(document.getElementById('modalCatat')).hide();
                form.reset();
                loadBantuan();
            } else {
                showNotification('❌ ' + result.message, 'danger');
            }
        }

        loadBantuan();
    </script>
</body>
</html>
