<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan - SIPEDULI BADUNG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header p-3 text-center">
            <i class="bi bi-heart-pulse-fill fs-2 text-white"></i>
            <h6 class="text-white fw-bold mt-2 mb-0">SIPEDULI BADUNG</h6>
            <small class="text-white-50">Laporan</small>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link-sidebar"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="data-disabilitas.html" class="nav-link-sidebar"><i class="bi bi-people"></i> Data Disabilitas</a>
            <a href="asesmen.html" class="nav-link-sidebar"><i class="bi bi-clipboard2-check"></i> e-Asesmen</a>
            <a href="monitoring.html" class="nav-link-sidebar"><i class="bi bi-geo-alt"></i> Monitoring</a>
            <a href="laporan.html" class="nav-link-sidebar active"><i class="bi bi-file-earmark-bar-graph"></i> Laporan</a>
            <a href="pimpinan.html" class="nav-link-sidebar"><i class="bi bi-bar-chart-line"></i> Dashboard Pimpinan</a>
            <hr class="text-white-50 mx-3">
            <a href="login.html" class="nav-link-sidebar text-danger" onclick="sessionStorage.clear()"><i class="bi bi-box-arrow-right"></i> Keluar</a>
        </nav>
    </div>

    <div class="main-content">
        <nav class="navbar top-navbar shadow-sm px-4">
            <button class="btn btn-sm btn-outline-secondary d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <h5 class="mb-0 fw-bold text-maroon">Laporan</h5>
            <div></div>
        </nav>

        <div class="content-area p-4">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-maroon text-white">
                    <h6 class="mb-0"><i class="bi bi-funnel me-2"></i>Filter Laporan</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label small fw-semibold">Kecamatan</label>
                            <select class="form-select form-select-sm" id="fKec">
                                <option value="">Semua</option>
                                <option>Kuta</option><option>Kuta Selatan</option><option>Abiansemal</option><option>Mengwi</option><option>Petang</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-semibold">Jenis Disabilitas</label>
                            <select class="form-select form-select-sm" id="fJenis">
                                <option value="">Semua</option>
                                <option>Fisik</option><option>Mental</option><option>Intelektual</option><option>Sensorik</option><option>Ganda</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-semibold">Jenis Kelamin</label>
                            <select class="form-select form-select-sm" id="fJK">
                                <option value="">Semua</option><option>Laki-laki</option><option>Perempuan</option>
                            </select>
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button class="btn btn-maroon btn-sm w-100" onclick="loadLaporan()">
                                <i class="bi bi-funnel me-1"></i>Tampilkan
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-4 d-flex gap-2 flex-wrap">
                <button class="btn btn-success btn-sm rounded-pill" onclick="ExportManager.exportToExcel('#tabelLaporan', 'Laporan_Disabilitas')">
                    <i class="bi bi-file-earmark-excel me-1"></i>Export Excel
                </button>
                <button class="btn btn-danger btn-sm rounded-pill" onclick="ExportManager.exportToPDF('#tabelLaporan', {title: 'REKAP DATA PENYANDANG DISABILITAS', filename: 'Laporan_Disabilitas', orientation: 'landscape'})">
                    <i class="bi bi-file-earmark-pdf me-1"></i>Export PDF
                </button>
                <button class="btn btn-secondary btn-sm rounded-pill" onclick="ExportManager.printReport('#tabelLaporan', 'Rekap Data Penyandang Disabilitas')">
                    <i class="bi bi-printer me-1"></i>Cetak
                </button>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white fw-bold text-maroon">
                    <i class="bi bi-table me-2"></i>Rekap Data Penyandang Disabilitas
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover mb-0" id="tabelLaporan">
                            <thead class="bg-maroon text-white">
                                <tr><th>No</th><th>NIK</th><th>Nama</th><th>JK</th><th>Kecamatan</th><th>Desa</th><th>Jenis</th><th>Tingkat</th><th>DTKS</th><th>Skor</th></tr>
                            </thead>
                            <tbody id="tbodyLaporan">
                                <tr><td colspan="10" class="text-center py-3">Memuat data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.0/jspdf.plugin.autotable.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/export.js"></script>
    <script>
        async function loadLaporan() {
            const filters = {
                kecamatan: document.getElementById('fKec').value,
                jenis_disabilitas: document.getElementById('fJenis').value
            };
            showLoading('Memuat laporan...');
            const result = await api.getDisabilitas(filters);
            hideLoading();
            
            if (result.success) {
                let data = result.data;
                const jk = document.getElementById('fJK').value;
                if (jk) data = data.filter(r => r.jenis_kelamin === jk);
                renderLaporan(data);
            }
        }

        function renderLaporan(data) {
            const tbody = document.getElementById('tbodyLaporan');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted py-3">Tidak ada data</td></tr>';
                return;
            }
            tbody.innerHTML = data.map((r, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${r.nik || '-'}</td>
                    <td>${r.nama_lengkap || '-'}</td>
                    <td>${(r.jenis_kelamin || 'L')[0]}</td>
                    <td>${r.kecamatan || '-'}</td>
                    <td>${r.desa || '-'}</td>
                    <td>${r.jenis_disabilitas || '-'}</td>
                    <td>${r.tingkat_keparahan || '-'}</td>
                    <td>${r.status_dtks || 'Tidak'}</td>
                    <td>${r.skor_prioritas || '-'}</td>
                </tr>
            `).join('');
        }

        loadLaporan();
    </script>
</body>
</html>
